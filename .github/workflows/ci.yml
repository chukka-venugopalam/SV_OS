name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.ai/**'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  NEXT_PUBLIC_API_URL: http://localhost:8000
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: svos
          POSTGRES_PASSWORD: svos_dev_password
          POSTGRES_DB: svos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: TypeScript Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Backend Lint (Ruff)
        working-directory: apps/api
        run: pip install ruff && ruff check .

      - name: Backend Tests
        working-directory: apps/api
        run: pip install pytest pytest-asyncio httpx && python -m pytest tests/ -vv --tb=long -ra --maxfail=1 -s 2>&1 | tee pytest.log

      - name: Upload pytest full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-log
          path: apps/api/pytest.log
          retention-days: 7
          if-no-files-found: warn

      - name: Docker Build (API)
        run: docker build -f Dockerfile.api -t sv-os-api:ci .

      - name: Docker Build (Web)
        run: docker build -f Dockerfile.web -t sv-os-web:ci .
